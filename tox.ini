[tox]
envlist =
    py{311,312,313}-django5
    lint
    dev
    prodsettings
toxworkdir = {env:TOX_WORKDIR:.tox}

[testenv]
deps =
    -rrequirements_dev.txt
    django5: Django>=5.1,<6
allowlist_externals = make
commands = make test

[testenv:lint]
deps =
    -rrequirements_dev.txt
allowlist_externals = make
commands = make lint

[testenv:dev]
allowlist_externals = make
commands =
    make update
    make
    make createdb

[testenv:prodsettings]
allowlist_externals = make
setenv =
    XORGDATA_APP_MODE = prod
    XORGDATA_APP_SECRET_KEY = this is a long key to pass SECRET_KEY length check
    XORGDATA_SITE_ALLOWED_HOSTS = 127.0.0.1,::1,localhost
commands =
    make checkdeploy

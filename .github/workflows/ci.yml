name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            django-version: "django5"
            toxenv: "py311-django5"
          - python-version: "3.12"
            django-version: "django5"
            toxenv: "py312-django5"
          - python-version: "3.13"
            django-version: "django5"
            toxenv: "py313-django5"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install tox
        run: pip install tox

      - name: Run tests
        run: tox -e ${{ matrix.toxenv }}

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tox
        run: pip install tox

      - name: Run linting
        run: tox -e lint

  prodsettings:
    name: Check production settings
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install tox
        run: pip install tox

      - name: Check deploy settings
        run: tox -e prodsettings
